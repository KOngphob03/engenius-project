services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: project-web
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_PUBLIC_API_URL: "http://localhost:3001"
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: project-api
    environment:
      NODE_ENV: production
      PORT: "3001"
      HOST: "0.0.0.0"
    ports:
      - "3001:3001"
    restart: unless-stopped